version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: cantolyr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cantolyr
      POSTGRES_USER: cantolyr
      POSTGRES_PASSWORD: cantolyr_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cantolyr -d cantolyr"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local