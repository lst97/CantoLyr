services:
  db:
    image: postgres:17.6-alpine
    container_name: cantolyr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cantolyr
      POSTGRES_USER: cantolyr
      POSTGRES_PASSWORD: cantolyr_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cantolyr -d cantolyr"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: cantolyr-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - CHROMA_SERVER_CORS_ALLOW_ORIGINS=*
      - ANONYMIZED_TELEMETRY=false
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  chroma_data:
    driver: local
